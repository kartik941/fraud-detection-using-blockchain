<!DOCTYPE html>

<html>

<head>
    <title>BlockGuard</title>


<style>
    body {
        font-family: Arial;
        background: #0f172a;
        color: white;
        padding: 20px;
    }

    h2 {
        text-align: center;
    }

    .container {
        max-width: 800px;
        margin: auto;
    }

    .card {
        background: #1e293b;
        padding: 20px;
        margin-top: 20px;
        border-radius: 12px;
        transition: 0.2s ease;
    }

    .card:hover {
        transform: scale(1.02);
        box-shadow: 0 0 15px rgba(59,130,246,0.4);
    }

    input {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border-radius: 5px;
        border: none;
    }

    button {
        width: 100%;
        padding: 12px;
        background: #3b82f6;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover {
        background: #2563eb;
    }

    .status {
        font-size: 22px;
        font-weight: bold;
    }

    .approved {
        color: #22c55e;
    }

    .suspicious {
        color: #f59e0b;
    }

    .fraud {
        color: #ef4444;
    }

    .badge {
        background: #334155;
        padding: 6px 10px;
        border-radius: 5px;
        display: inline-block;
        margin-top: 10px;
    }

    .hash-box {
        background: #020617;
        padding: 10px;
        border-radius: 6px;
        font-size: 12px;
        word-break: break-all;
        margin-top: 10px;
        border: 1px solid #334155;
    }

    a {
        color: #60a5fa;
        word-break: break-all;
    }

    ul {
        padding-left: 20px;
    }
</style>


</head>

<body>


<div class="container">

    <h2>🚀 BlockGuard - Blockchain Fraud Detection</h2>

    <!-- INPUT -->
    <div class="card">
        <h3>Send Transaction</h3>

        <input id="user" placeholder="User ID">
        <input id="amount" placeholder="Amount">
        <input id="ip" placeholder="IP Address">

        <button onclick="sendTransaction()">Analyze Transaction</button>
    </div>

    <!-- RESULT -->
    <div class="card" id="result" style="display:none;">
        <h3>Latest Result</h3>

        <div id="status" class="status"></div>
        <div id="score" class="badge"></div>

        <h4>Reasons:</h4>
        <ul id="reasons"></ul>

        <h4>Blockchain:</h4>
        <a id="txlink" target="_blank"></a>

        <h4>Data Hash:</h4>
        <div id="hash" class="hash-box"></div>
    </div>

    <!-- HISTORY -->
    <div class="card">
        <h3>Transaction History</h3>
        <button onclick="loadTransactions()">Load History</button>
        <div id="history"></div>
    </div>

</div>

<script>

    function getStatusClass(status) {
        if (status === "APPROVED") return "approved";
        if (status === "SUSPICIOUS") return "suspicious";
        return "fraud";
    }

    function getStatusIcon(status) {
        if (status === "APPROVED") return "✅";
        if (status === "SUSPICIOUS") return "⚠️";
        return "🚨";
    }

    async function sendTransaction() {
        const user = document.getElementById("user").value;
        const amount = parseFloat(document.getElementById("amount").value);
        const ip = document.getElementById("ip").value;

        const res = await fetch("https://fraud-detection-using-blockchain.onrender.com/transaction", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                user_id: user,
                amount: amount,
                ip_address: ip
            })
        });

        const data = await res.json();

        document.getElementById("result").style.display = "block";

        const statusEl = document.getElementById("status");
        statusEl.innerText = getStatusIcon(data.status) + " " + data.status;
        statusEl.className = "status " + getStatusClass(data.status);

        document.getElementById("score").innerText = "Risk Score: " + data.risk_score;

        const reasonsList = document.getElementById("reasons");
        reasonsList.innerHTML = "";
        data.reasons.forEach(r => {
            const li = document.createElement("li");
            li.innerText = r;
            reasonsList.appendChild(li);
        });

        const txLink = document.getElementById("txlink");
        txLink.href = `https://sepolia.etherscan.io/tx/${data.blockchain_tx}`;
        txLink.innerText = data.blockchain_tx;

        // 🔥 SHOW HASH
        document.getElementById("hash").innerText = data.data_hash;
    }

    async function loadTransactions() {
        const res = await fetch("https://fraud-detection-using-blockchain.onrender.com/transactions");
        const data = await res.json();

        const container = document.getElementById("history");
        container.innerHTML = "";

        data.reverse().forEach(tx => {
            const div = document.createElement("div");
            div.className = "card";

            div.innerHTML = `
                <div class="status ${getStatusClass(tx.status)}">
                    ${getStatusIcon(tx.status)} ${tx.status}
                </div>

                <div class="badge">₹ ${tx.amount}</div>

                <p><strong>User:</strong> ${tx.user_id}</p>
                <p><strong>Risk Score:</strong> ${tx.risk_score}</p>

                <p><strong>Reasons:</strong></p>
                <ul>
                    ${(tx.reasons || []).map(r => `<li>${r}</li>`).join("")}
                </ul>

                <p><strong>Blockchain:</strong></p>
                <a href="https://sepolia.etherscan.io/tx/${tx.blockchain_tx}" target="_blank">
                    View Transaction 🔗
                </a>

                <p><strong>Data Hash:</strong></p>
                <div class="hash-box">${tx.data_hash}</div>
            `;

            container.appendChild(div);
        });
    }

</script>
```

</body>

</html>
