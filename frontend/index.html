<!DOCTYPE html>
<html>
<head>
    <title>Fraud Detection System</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            padding: 20px;
        }

        h2 {
            text-align: center;
        }

        .container {
            max-width: 600px;
            margin: auto;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            margin-top: 20px;
            border-radius: 10px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #2563eb;
        }

        .status {
            font-size: 22px;
            font-weight: bold;
        }

        .approved { color: #22c55e; }
        .suspicious { color: #f59e0b; }
        .fraud { color: #ef4444; }

        .badge {
            background: #334155;
            padding: 6px 10px;
            border-radius: 5px;
            display: inline-block;
            margin-top: 10px;
        }

        a {
            color: #60a5fa;
            word-break: break-all;
        }

        ul {
            padding-left: 20px;
        }
    </style>
</head>

<body>

<div class="container">

<h2>🚀 Fraud Detection + Blockchain</h2>

<div class="card">
    <h3>Send Transaction</h3>

    <input id="user" placeholder="User ID">
    <input id="amount" placeholder="Amount">
    <input id="ip" placeholder="IP Address">

    <button onclick="sendTransaction()">Analyze Transaction</button>
</div>

<div class="card" id="result" style="display:none;">
    <h3>Result</h3>

    <div id="status" class="status"></div>
    <div id="score" class="badge"></div>

    <h4>Reasons:</h4>
    <ul id="reasons"></ul>

    <h4>Blockchain:</h4>
    <a id="txlink" target="_blank"></a>
</div>

<div class="card">
    <h3>Transaction History</h3>
    <button onclick="loadTransactions()">Load History</button>
    <ul id="history"></ul>
</div>

</div>

<script>

function getStatusClass(status) {
    if (status === "APPROVED") return "approved";
    if (status === "SUSPICIOUS") return "suspicious";
    return "fraud";
}

async function sendTransaction() {
    const user = document.getElementById("user").value;
    const amount = parseFloat(document.getElementById("amount").value);
    const ip = document.getElementById("ip").value;

    const res = await fetch("http://127.0.0.1:8000/transaction", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            user_id: user,
            amount: amount,
            ip_address: ip
        })
    });

    const data = await res.json();

    document.getElementById("result").style.display = "block";

    const statusEl = document.getElementById("status");
    statusEl.innerText = data.status;
    statusEl.className = "status " + getStatusClass(data.status);

    document.getElementById("score").innerText = "Risk Score: " + data.risk_score;

    const reasonsList = document.getElementById("reasons");
    reasonsList.innerHTML = "";
    data.reasons.forEach(r => {
        const li = document.createElement("li");
        li.innerText = r;
        reasonsList.appendChild(li);
    });

    // 🔥 Etherscan link
    const txLink = document.getElementById("txlink");
    txLink.href = `https://sepolia.etherscan.io/tx/${data.blockchain_tx}`;
    txLink.innerText = data.blockchain_tx;
}

async function loadTransactions() {
    const res = await fetch("http://127.0.0.1:8000/transactions");
    const data = await res.json();

    const list = document.getElementById("history");
    list.innerHTML = "";

    data.forEach(tx => {
        const li = document.createElement("li");
        li.innerText = `${tx.user_id} | ₹${tx.amount} | ${tx.status}`;
        list.appendChild(li);
    });
}

</script>

</body>
</html>
